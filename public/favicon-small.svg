<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <style>
      .favicon-bg { fill: #4F46E5; }
      .favicon-icon { fill: #FFFFFF; }
    </style>
  </defs>
  <rect class="favicon-bg" width="32" height="32" rx="6"/>
  <g transform="translate(6, 6)">
    <rect class="favicon-icon" x="0" y="0" width="20" height="20" rx="2"/>
    <rect class="favicon-icon" x="2" y="4" width="12" height="1"/>
    <rect class="favicon-icon" x="2" y="7" width="12" height="1"/>
    <rect class="favicon-icon" x="2" y="10" width="12" height="1"/>
  </g>
</svg>
